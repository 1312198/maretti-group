<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maretti</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #111;
      font-family: Arial, sans-serif;
    }

    .header {
      background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo img {
      height: 56px;
      width: auto;
      display: block;
    }

    .header-contact {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      line-height: 1.4;
    }

    .header-contact span {
      font-size: 14px;
      color: #666;
    }

    .header-contact a {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .header-contact a:hover {
      color: #e62648;
    }

    .menu-bar {
      background: #e62648;
    }

    .menu-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      justify-content: center;
    }

    .menu {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 42px;
      min-height: 56px;
      text-align: center;
    }

    .menu a {
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .menu a:hover {
      opacity: 0.8;
    }

    .hero {
      min-height: calc(100vh - 150px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .wrapper {
      text-align: center;
      max-width: 700px;
    }

    h1 {
      font-family: "Harlow Solid Italic", cursive;
      font-size: 96px;
      font-weight: normal;
      line-height: 1;
      color: #111;
      margin-bottom: 24px;
    }

    .italy-flag-line {
      width: 360px;
      height: 16px;
      margin: 0 auto 28px;
      display: flex;
      overflow: hidden;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .italy-flag-line div {
      flex: 1;
    }

    .green {
      background: #009246;
    }

    .white {
      background: #ffffff;
    }

    .red {
      background: #ce2b37;
    }

    .subtitle {
      font-size: 28px;
      color: #444;
      letter-spacing: 0.4px;
    }

    .catalog-link {
      margin-top: 34px;
    }

    .catalog-link a {
      color: #009246;
      text-decoration: none;
      font-size: 20px;
      border-bottom: 1px solid #009246;
      padding-bottom: 2px;
      transition: all 0.2s ease;
    }

    .catalog-link a:hover {
      color: #ce2b37;
      border-bottom-color: #ce2b37;
    }

    @media (max-width: 900px) {
      .header-inner,
      .menu-inner {
        padding-left: 20px;
        padding-right: 20px;
      }

      .menu {
        gap: 24px;
        flex-wrap: wrap;
        padding: 14px 0;
      }

      .logo img {
        height: 48px;
      }

      h1 {
        font-size: 72px;
      }
    }

    @media (max-width: 600px) {
      .header-inner {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 14px;
        padding: 16px;
      }

      .header-contact {
        align-items: center;
        text-align: center;
      }

      .header-contact span {
        font-size: 13px;
      }

      .header-contact a {
        font-size: 18px;
      }

      .logo img {
        height: 42px;
      }

      .menu {
        gap: 14px 18px;
        min-height: auto;
      }

      .menu a {
        font-size: 14px;
      }

      h1 {
        font-size: 56px;
      }

      .italy-flag-line {
        width: 260px;
        height: 12px;
      }

      .subtitle {
        font-size: 20px;
      }

      .catalog-link a {
        font-size: 18px;
      }

      .hero {
        padding: 40px 16px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <img src="logo.png" alt="Maretti">
      </a>

      <div class="header-contact">
        <span>По вопросам дистрибуции:</span>
        <a href="tel:+79582032658">8 (958)203-26-58</a>
      </div>
    </div>

    <div class="menu-bar">
      <div class="menu-inner">
        <ul class="menu">
          <li><a href="#">Главная</a></li>
          <li><a href="#">О бренде</a></li>
          <li><a href="#">Сотрудничество</a></li>
          <li><a href="#">Сервис</a></li>
          <li><a href="#">Контакты</a></li>
        </ul>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="wrapper">
      <h1>Maretti</h1>

      <div class="italy-flag-line">
        <div class="green"></div>
        <div class="white"></div>
        <div class="red"></div>
      </div>

      <p class="subtitle">Сайт скоро будет доступен</p>

      <div class="catalog-link">
        <a href="Catalog%20Maretti%202026.pdf" download>
          Скачать каталог Maretti 2026
        </a>
      </div>
    </div>
  </main>

</body>
</html>
